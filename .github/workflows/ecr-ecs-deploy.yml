name: ECR + ECS Deployment Pipeline

on:
  push:
    branches: ["main", "master"]

# Only one deployment runs at a time; cancel older runs on same branch
concurrency:
  group: ecs-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: eu-north-1
  ECR_REPO_SERVER: fsdproj-server
  ECR_REPO_CLIENT: fsdproj-client
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build Docker images and push to ECR
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    outputs:
      server-image: ${{ steps.build-server.outputs.image }}
      client-image: ${{ steps.build-client.outputs.image }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── AWS Auth ─────────────────────────────────────────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & Push Server Image ─────────────────────────────────────────────
      - name: Build, Tag & Push Server Image
        id: build-server
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./server
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPO_SERVER"

          echo "Building server image..."
          docker build \
            --tag "$IMAGE_URI:$IMAGE_TAG" \
            --tag "$IMAGE_URI:latest" \
            --cache-from "$IMAGE_URI:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

          echo "Pushing server image..."
          docker push "$IMAGE_URI:$IMAGE_TAG"
          docker push "$IMAGE_URI:latest"

          echo "image=$IMAGE_URI:$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "✅ Server image pushed: $IMAGE_URI:$IMAGE_TAG"

      # ── Build & Push Client Image ─────────────────────────────────────────────
      - name: Build, Tag & Push Client Image
        id: build-client
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./client
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPO_CLIENT"

          echo "Building client image..."
          docker build \
            --tag "$IMAGE_URI:$IMAGE_TAG" \
            --tag "$IMAGE_URI:latest" \
            --cache-from "$IMAGE_URI:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --build-arg VITE_API_URL="${{ secrets.VITE_API_URL }}" \
            --build-arg VITE_GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            .

          echo "Pushing client image..."
          docker push "$IMAGE_URI:$IMAGE_TAG"
          docker push "$IMAGE_URI:latest"

          echo "image=$IMAGE_URI:$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "✅ Client image pushed: $IMAGE_URI:$IMAGE_TAG"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Update ECS Task Definitions and deploy services
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-to-ecs:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Server: Render Task Definition with new image ─────────────────────────
      - name: Download current server task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEF_SERVER }} \
            --query taskDefinition \
            --output json > /tmp/server-task-def.json

      - name: Render new server task definition (updated image)
        id: render-server-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/server-task-def.json
          container-name: fsdproj-server
          image: ${{ needs.build-and-push.outputs.server-image }}

      - name: Deploy server to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-server-task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_SERVER }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── Client: Render Task Definition with new image ─────────────────────────
      - name: Download current client task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEF_CLIENT }} \
            --query taskDefinition \
            --output json > /tmp/client-task-def.json

      - name: Render new client task definition (updated image)
        id: render-client-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/client-task-def.json
          container-name: fsdproj-client
          image: ${{ needs.build-and-push.outputs.client-image }}

      - name: Deploy client to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-client-task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_CLIENT }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── Deployment Summary ────────────────────────────────────────────────────
      - name: Deployment Summary
        run: |
          echo "======================================================"
          echo "  ✅ ECS Deployment Complete!"
          echo "======================================================"
          echo "  Commit SHA : ${{ github.sha }}"
          echo "  Server Image: ${{ needs.build-and-push.outputs.server-image }}"
          echo "  Client Image: ${{ needs.build-and-push.outputs.client-image }}"
          echo "  ECS Cluster : ${{ secrets.ECS_CLUSTER }}"
          echo "  Region      : ${{ env.AWS_REGION }}"
          echo "======================================================"
