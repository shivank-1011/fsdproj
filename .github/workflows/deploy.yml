name: EC2 Deployment Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Build client on CI/CD runner to avoid taxing the EC2 server resources
      - name: Setup Node.js (Client Build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Client dependencies
        run: npm ci
        working-directory: ./client

      - name: Build Client
        run: npm run build
        working-directory: ./client
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}


      # Use SCP to safely sync files into EC2
      # Required repository secrets: EC2_HOST, EC2_USERNAME, EC2_PRIVATE_KEY
      - name: Copy Files to EC2 via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "./server,./client/dist,./scripts/deploy.sh"
          target: "/home/ubuntu/fsdproj"
          strip_components: 0

      # Use SSH to execute the idempotent script on EC2
      - name: Execute Deployment Script on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            chmod +x /home/ubuntu/fsdproj/scripts/deploy.sh
            /home/ubuntu/fsdproj/scripts/deploy.sh
